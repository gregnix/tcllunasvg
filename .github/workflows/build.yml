# Build and test tcllunasvg.
#
# The matrix covers the combinations that broke in practice:
#
#   Tcl 8.6 and 9.0        the stub ABIs differ, and reconfiguring between them
#                          used to relink stale objects
#   both in one directory  pkgIndex.tcl has to pick the right binary
#   Windows/MinGW          another C runtime, another library naming scheme
#
# lunasvg is built from source and cached; it is pinned to a tag so an upstream
# API change shows up as a deliberate bump rather than as a red build one
# morning.

name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

env:
  LUNASVG_REF: v3.5.0

jobs:
  linux:
    name: Linux, Tcl ${{ matrix.tcl }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        tcl: [ "8.6", "9.0" ]

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      # Tcl 8.6 comes from the distribution; 9.0 is not packaged yet and is
      # built from source. The cache keeps that off the critical path.
      - name: Install Tcl 8.6
        if: matrix.tcl == '8.6'
        run: sudo apt-get install -y tcl8.6-dev tcl8.6

      - name: Cache Tcl 9.0
        if: matrix.tcl == '9.0'
        id: cache-tcl9
        uses: actions/cache@v4
        with:
          path: /opt/tcl9
          key: tcl9-9.0.4-${{ runner.os }}

      - name: Build Tcl 9.0
        if: matrix.tcl == '9.0' && steps.cache-tcl9.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o tcl.tar.gz \
            https://downloads.sourceforge.net/project/tcl/Tcl/9.0.4/tcl9.0.4-src.tar.gz
          tar xzf tcl.tar.gz
          cd tcl9.0.4/unix
          ./configure --prefix=/opt/tcl9
          make -j$(nproc)
          sudo make install

      - name: Cache lunasvg
        id: cache-lunasvg
        uses: actions/cache@v4
        with:
          path: ~/lunasvg
          key: lunasvg-${{ env.LUNASVG_REF }}-${{ runner.os }}

      - name: Build lunasvg
        if: steps.cache-lunasvg.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "$LUNASVG_REF" \
            https://github.com/sammycage/lunasvg ~/lunasvg
          cd ~/lunasvg
          cmake -B build_shared -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release .
          cmake --build build_shared -j$(nproc)

      - name: Configure
        run: |
          if [ "${{ matrix.tcl }}" = "9.0" ]; then
            TCLDIR=/opt/tcl9/lib
          else
            TCLDIR=/usr/lib/x86_64-linux-gnu/tcl8.6
          fi
          ./configure --with-tcl="$TCLDIR" --with-lunasvg="$HOME/lunasvg"

      - name: Build
        run: make

      # The build has to stay free of warnings: the one that lingered here was a
      # dead helper nobody noticed for months.
      - name: Build again, fail on warnings
        run: |
          make clean
          make 2>&1 | tee build.log
          if grep -q "warning:" build.log; then
            echo "::error::compiler warnings in the build"
            grep "warning:" build.log
            exit 1
          fi

      - name: Test
        run: LD_LIBRARY_PATH="$HOME/lunasvg/build_shared" make test

      - name: Install
        run: sudo make install

  # Reconfiguring for the other generation must recompile. Without the
  # dependency of the objects on the Makefile, make relinks the old ones and
  # the result reports "this extension is compiled for Tcl 8.6" under Tcl 9.
  switch-generations:
    name: Linux, switching 8.6 <-> 9.0 without clean
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and Tcl 8.6
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake tcl8.6-dev tcl8.6

      - name: Cache Tcl 9.0
        id: cache-tcl9
        uses: actions/cache@v4
        with:
          path: /opt/tcl9
          key: tcl9-9.0.4-${{ runner.os }}

      - name: Build Tcl 9.0
        if: steps.cache-tcl9.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o tcl.tar.gz \
            https://downloads.sourceforge.net/project/tcl/Tcl/9.0.4/tcl9.0.4-src.tar.gz
          tar xzf tcl.tar.gz
          cd tcl9.0.4/unix
          ./configure --prefix=/opt/tcl9
          make -j$(nproc)
          sudo make install

      - name: Cache lunasvg
        id: cache-lunasvg
        uses: actions/cache@v4
        with:
          path: ~/lunasvg
          key: lunasvg-${{ env.LUNASVG_REF }}-${{ runner.os }}

      - name: Build lunasvg
        if: steps.cache-lunasvg.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch "$LUNASVG_REF" \
            https://github.com/sammycage/lunasvg ~/lunasvg
          cd ~/lunasvg
          cmake -B build_shared -DBUILD_SHARED_LIBS=ON -DCMAKE_BUILD_TYPE=Release .
          cmake --build build_shared -j$(nproc)

      - name: 8.6, then 9.0 without make clean
        run: |
          export LD_LIBRARY_PATH="$HOME/lunasvg/build_shared"
          ./configure --with-tcl=/usr/lib/x86_64-linux-gnu/tcl8.6 \
                      --with-lunasvg="$HOME/lunasvg"
          make && make test
          ./configure --with-tcl=/opt/tcl9/lib --with-lunasvg="$HOME/lunasvg"
          make && make test

      - name: Both generations in one package directory
        run: |
          export LD_LIBRARY_PATH="$HOME/lunasvg/build_shared"
          make install DESTDIR=/tmp/both prefix=/usr
          make clean
          ./configure --with-tcl=/usr/lib/x86_64-linux-gnu/tcl8.6 \
                      --with-lunasvg="$HOME/lunasvg"
          make
          make install DESTDIR=/tmp/both prefix=/usr
          ls -l /tmp/both/usr/lib/tcltk/tcllunasvg*/
          for sh in /opt/tcl9/bin/tclsh9.0 tclsh8.6; do
            echo "== $sh"
            $sh <<'TCL'
          lappend auto_path /tmp/both/usr/lib/tcltk
          puts "loaded [package require tcllunasvg], lunasvg [tcllunasvg::version]"
          TCL
          done

  windows:
    name: Windows, MSYS2 ${{ matrix.msystem }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        msystem: [ MINGW64, UCRT64 ]
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: git make autoconf
          pacboy: >-
            gcc:p cmake:p tcl:p

      # -static-libstdc++ keeps lunasvg from depending on a MinGW runtime that
      # a Tcl distribution may already have loaded from its own bin directory;
      # --out-implib produces the import library the linker needs.
      - name: Build lunasvg
        run: |
          git clone --depth=1 --branch "$LUNASVG_REF" \
            https://github.com/sammycage/lunasvg ~/lunasvg
          cd ~/lunasvg
          cmake -B build_shared -DBUILD_SHARED_LIBS=ON \
                -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc -Wl,--out-implib,liblunasvg.dll.a" .
          cmake --build build_shared -j

      # cygpath -m: the native linker cannot resolve a -L built from an MSYS
      # path, it has no drive letter.
      - name: Configure and build
        run: |
          ./configure --with-tcl=$(cygpath -m /$MSYSTEM_PREFIX/lib) \
                      --with-lunasvg=$(cygpath -m ~/lunasvg)
          make

      - name: Test
        run: make test
